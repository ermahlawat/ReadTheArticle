  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #666666;
      --accent: #0a84ff;
      --accent-hover: #006edb;
      --bar-bg: #ffffffee;
      --border: #e0e0e0;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(0,0,0,.10);
      --font-body: Georgia, 'Times New Roman', serif;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero / landing ───────────────────────────────────────── */
    #landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem 4rem;
      gap: 1.5rem;
      text-align: center;
    }

    #landing h1 {
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    #landing p.subtitle {
      color: var(--muted);
      font-size: 1rem;
      max-width: 34ch;
    }

    /* ── URL input row ────────────────────────────────────────── */
    #url-form {
      display: flex;
      width: 100%;
      max-width: 640px;
      gap: .5rem;
      flex-wrap: wrap;
    }

    #url-input {
      flex: 1;
      min-width: 0;
      padding: .75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: var(--font-ui);
      background: var(--surface);
      outline: none;
      transition: border-color .2s;
    }

    #url-input:focus { border-color: var(--accent); }

    #fetch-btn {
      padding: .75rem 1.4rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: var(--font-ui);
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, opacity .2s;
    }

    #fetch-btn:hover { background: var(--accent-hover); }
    #fetch-btn:disabled { opacity: .55; cursor: default; }

    /* ── Status / error ───────────────────────────────────────── */
    #status {
      font-size: .9rem;
      color: var(--muted);
      min-height: 1.4em;
    }

    #status.error { color: #c0392b; }

    /* ── Audio bar (sticky top, hidden until article loads) ───── */
    #audio-bar {
      display: none;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: .6rem 1rem;
      gap: .6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    #audio-bar.visible { display: flex; }

    /* play / pause */
    #play-btn {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s;
    }

    #play-btn:hover { background: var(--accent-hover); }

    #play-btn svg { fill: #fff; width: 1rem; height: 1rem; }

    /* progress */
    #progress-wrap {
      flex: 1;
      min-width: 120px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    #progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
    }

    #progress-bar::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
    }

    #time-label {
      font-size: .7rem;
      color: var(--muted);
    }

    /* selects */
    .bar-select {
      padding: .3rem .5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .8rem;
      background: var(--surface);
      font-family: var(--font-ui);
      max-width: 150px;
      cursor: pointer;
    }

    #speed-select { max-width: 80px; }

    /* ── Reader article area ──────────────────────────────────── */
    #reader {
      display: none;
      flex: 1;
    }

    #reader.visible { display: block; }

    #article-meta {
      padding: 2rem 1.25rem 0;
      max-width: 720px;
      margin: 0 auto;
    }

    #article-title {
      font-family: var(--font-body);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: .5rem;
    }

    #article-byline {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    #article-body {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem 1.25rem 4rem;
      font-family: var(--font-body);
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      line-height: 1.75;
      color: var(--text);
    }

    #article-body p  { margin-bottom: 1.2em; }
    #article-body h1,
    #article-body h2,
    #article-body h3,
    #article-body h4 {
      font-family: var(--font-ui);
      font-weight: 700;
      margin: 1.6em 0 .5em;
      line-height: 1.25;
    }
    #article-body h1 { font-size: 1.6em; }
    #article-body h2 { font-size: 1.35em; }
    #article-body h3 { font-size: 1.15em; }
    #article-body a  { color: var(--accent); text-decoration: none; }
    #article-body a:hover { text-decoration: underline; }
    #article-body img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1em 0;
    }
    #article-body blockquote {
      border-left: 3px solid var(--accent);
      margin: 1em 0;
      padding: .5em 1em;
      color: var(--muted);
      font-style: italic;
    }
    #article-body pre, #article-body code {
      font-family: 'Courier New', monospace;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: .9em;
    }
    #article-body code { padding: .1em .3em; }
    #article-body pre  { padding: 1em; overflow-x: auto; }

    /* ── "New article" button ─────────────────────────────────── */
    #new-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: .6rem 1.1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 2rem;
      font-size: .875rem;
      font-family: var(--font-ui);
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: none;
      transition: background .2s;
    }

    #new-btn:hover { background: var(--accent-hover); }
    #new-btn.visible { display: block; }

    /* ── Spinner ──────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: .9em; height: .9em;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .3em;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      #audio-bar { gap: .4rem; }
      .bar-select { max-width: 110px; }
      #speed-select { max-width: 70px; }
    }
  </style>
</head>
<body>

<!-- ── Landing / URL input ──────────────────────────────────────── -->
<section id="landing">
  <h1>📰 ReadTheArticle</h1>
  <p class="subtitle">Paste any article URL. Get a clean read — and listen to it.</p>

  <form id="url-form" onsubmit="return false;">
    <input
      id="url-input"
      type="url"
      placeholder="https://example.com/article"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button id="fetch-btn" type="button" onclick="fetchArticle()">Fetch</button>
  </form>

  <p id="status"></p>
</section>

<!-- ── Sticky audio bar (shown after article loads) ─────────────── -->
<div id="audio-bar" role="toolbar" aria-label="Audio controls">
  <button id="play-btn" aria-label="Play" onclick="toggleSpeech()">
    <!-- Play icon -->
    <svg id="icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
    <!-- Pause icon (hidden) -->
    <svg id="icon-pause" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>

  <div id="progress-wrap">
    <input id="progress-bar" type="range" min="0" max="100" value="0"
      aria-label="Reading progress"
      oninput="seekSpeech(this.value)" />
    <span id="time-label">0 % read</span>
  </div>

  <select id="speed-select" class="bar-select" aria-label="Playback speed" onchange="updateRate()">
    <option value="0.5">0.5×</option>
    <option value="0.75">0.75×</option>
    <option value="1" selected>1×</option>
    <option value="1.25">1.25×</option>
    <option value="1.5">1.5×</option>
    <option value="1.75">1.75×</option>
    <option value="2">2×</option>
  </select>

  <select id="voice-select" class="bar-select" aria-label="Voice"></select>
</div>

<!-- ── Reader view ──────────────────────────────────────────────── -->
<div id="reader">
  <div id="article-meta">
    <h1 id="article-title"></h1>
    <p id="article-byline"></p>
  </div>
  <div id="article-body"></div>
</div>

<!-- ── "New article" FAB ────────────────────────────────────────── -->
<button id="new-btn" onclick="resetToLanding()" title="Read another article">
  + New article
</button>

<script>
/* ════════════════════════════════════════════════════════════════
   Configuration
   ════════════════════════════════════════════════════════════════ */

// Ordered list of CORS proxy templates. {URL} is replaced with the
// encoded target URL. We cycle through them on failure.
// Note: these are free public services — they may occasionally be down
// or rate-limited. If all fail the app shows a clear error to the user.
const CORS_PROXIES = [
  'https://api.allorigins.win/raw?url={URL}',
  'https://corsproxy.io/?{URL}',
  'https://api.codetabs.com/v1/proxy?quest={URL}',
];

// Minimum byte length that we consider a real HTML page (not an error response).
// Proxy error pages are typically very short; a real article page is much larger.
const MIN_PROXY_HTML_BYTES  = 500;
// Minimum byte length after all retries — below this we surface an error.
const MIN_ARTICLE_HTML_BYTES = 200;

// Paywall-stripping proxy — prepend to the original article URL.
const PAYWALL_PROXY = 'https://12ft.io/proxy?q=';

/* ════════════════════════════════════════════════════════════════
   DOM refs
   ════════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);

const elLanding    = $('landing');
const elUrlInput   = $('url-input');
const elFetchBtn   = $('fetch-btn');
const elStatus     = $('status');
const elAudioBar   = $('audio-bar');
const elReader     = $('reader');
const elTitle      = $('article-title');
const elByline     = $('article-byline');
const elBody       = $('article-body');
const elPlayBtn    = $('play-btn');
const elIconPlay   = $('icon-play');
const elIconPause  = $('icon-pause');
const elProgress   = $('progress-bar');
const elTimeLabel  = $('time-label');
const elSpeedSel   = $('speed-select');
const elVoiceSel   = $('voice-select');
const elNewBtn     = $('new-btn');

/* ════════════════════════════════════════════════════════════════
   State
   ════════════════════════════════════════════════════════════════ */
let articleText = '';    // plain text for TTS
let utterance   = null;  // current SpeechSynthesisUtterance
let speaking    = false;
let charOffset  = 0;     // chars spoken so far (for progress)
let totalChars  = 0;

/* ════════════════════════════════════════════════════════════════
   Fetch & parse article
   ════════════════════════════════════════════════════════════════ */
async function fetchArticle() {
  const raw = elUrlInput.value.trim();
  if (!raw) { setStatus('Please enter a URL.', true); return; }

  let targetUrl;
  try {
    targetUrl = new URL(raw).href;
  } catch {
    setStatus('That doesn\'t look like a valid URL.', true);
    return;
  }

  setStatus('<span class="spinner"></span> Fetching article…');
  elFetchBtn.disabled = true;

  // Layer 1: try fetching through each CORS proxy → 12ft.io
  const paywallUrl = PAYWALL_PROXY + encodeURIComponent(targetUrl);
  let html = null;

  for (let i = 0; i < CORS_PROXIES.length; i++) {
    const proxyUrl = CORS_PROXIES[i].replace('{URL}', encodeURIComponent(paywallUrl));
    try {
      setStatus(`<span class="spinner"></span> Trying proxy ${i + 1} of ${CORS_PROXIES.length}…`);
      const res = await fetchWithTimeout(proxyUrl, 15000);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      html = await res.text();
      if (html && html.length > MIN_PROXY_HTML_BYTES) break; // looks like a real page
    } catch (err) {
      console.warn(`Proxy ${i + 1} failed:`, err.message);
    }
  }

  // Layer 2: if all proxies failed, try raw fetch of the original URL
  if (!html) {
    try {
      setStatus('<span class="spinner"></span> Trying direct fetch…');
      const res = await fetchWithTimeout(targetUrl, 10000);
      if (res.ok) html = await res.text();
    } catch (_) { /* will surface error below */ }
  }

  if (!html || html.length < MIN_ARTICLE_HTML_BYTES) {
    setStatus('Could not retrieve the article. The site may block all proxies, or the URL may be incorrect.', true);
    elFetchBtn.disabled = false;
    return;
  }

  // Parse with Readability
  let article;
  try {
    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');
    // Set base URL so relative links resolve correctly
    const base   = doc.createElement('base');
    base.href    = targetUrl;
    doc.head.prepend(base);

    const reader = new Readability(doc);
    article = reader.parse();
  } catch (err) {
    setStatus('Failed to parse article content.', true);
    elFetchBtn.disabled = false;
    return;
  }

  if (!article || !article.content) {
    setStatus('Couldn\'t extract article text from that page.', true);
    elFetchBtn.disabled = false;
    return;
  }

  displayArticle(article, targetUrl);
  elFetchBtn.disabled = false;
}

/* ────────────────────────────────────────────────────────────────
   Display the parsed article
   ──────────────────────────────────────────────────────────────── */
function displayArticle(article, sourceUrl) {
  elTitle.textContent  = article.title  || 'Untitled';
  elByline.textContent = article.byline || new URL(sourceUrl).hostname;

  // Sanitise: Readability returns HTML; we trust it but strip scripts
  const sanitised = stripScripts(article.content);
  elBody.innerHTML = sanitised;

  // Extract plain text for TTS (strip all tags)
  articleText = elBody.innerText || elBody.textContent || '';
  totalChars  = articleText.length;
  charOffset  = 0;

  // Show reader, hide landing
  elLanding.style.display = 'none';
  elReader.classList.add('visible');
  elAudioBar.classList.add('visible');
  elNewBtn.classList.add('visible');
  elStatus.textContent = '';

  // Scroll to top of article
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Strip <script> and <style> tags from untrusted HTML */
function stripScripts(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('script, style').forEach(el => el.remove());
  return tmp.innerHTML;
}

/* ════════════════════════════════════════════════════════════════
   Web Speech API — Text-to-Speech
   ════════════════════════════════════════════════════════════════ */
function populateVoices() {
  const voices = speechSynthesis.getVoices();
  elVoiceSel.innerHTML = '';
  if (!voices.length) return;

  // Group: English voices first (sorted by preference), then others
  const sorted = [
    ...voices.filter(v => v.lang.startsWith('en')),
    ...voices.filter(v => !v.lang.startsWith('en')),
  ];

  // Find the best default voice using a priority list
  const priority = ['en-IN', 'en-GB', 'en-AU', 'en-US'];
  let defaultIdx = sorted.findIndex(v => priority.includes(v.lang));
  if (defaultIdx === -1) defaultIdx = 0; // fall back to first voice

  sorted.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    opt.selected = (i === defaultIdx);
    elVoiceSel.appendChild(opt);
  });
}

// Voices load asynchronously in some browsers
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.addEventListener('voiceschanged', populateVoices);
  populateVoices(); // try immediately too
}

function getSelectedVoice() {
  const voices = speechSynthesis.getVoices();
  const engVoices = [
    ...voices.filter(v => v.lang.startsWith('en')),
    ...voices.filter(v => !v.lang.startsWith('en')),
  ];
  const idx = parseInt(elVoiceSel.value, 10);
  return engVoices[idx] || voices[0] || null;
}

function toggleSpeech() {
  if (!articleText) return;

  if (speaking) {
    pauseSpeech();
  } else {
    startSpeech(charOffset);
  }
}

function startSpeech(fromChar = 0) {
  speechSynthesis.cancel();

  const text = articleText.slice(fromChar);
  if (!text.trim()) { resetProgress(); return; }

  utterance = new SpeechSynthesisUtterance(text);
  utterance.voice = getSelectedVoice();
  utterance.rate  = parseFloat(elSpeedSel.value);

  utterance.onboundary = (e) => {
    if (e.name === 'word') {
      charOffset = fromChar + e.charIndex;
      updateProgress();
    }
  };

  utterance.onend = () => {
    speaking = false;
    charOffset = totalChars;
    updateProgress();
    setPlayIcon(false);
  };

  utterance.onerror = (e) => {
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    console.error('Speech error:', e.error);
    speaking = false;
    setPlayIcon(false);
  };

  speechSynthesis.speak(utterance);
  speaking = true;
  setPlayIcon(true);
}

function pauseSpeech() {
  // We stop (cancel) instead of truly pausing because speechSynthesis.pause()
  // and .resume() are unreliable across browsers. The current char offset is
  // preserved so the user can resume from the same position via startSpeech().
  speechSynthesis.cancel();
  speaking = false;
  setPlayIcon(false);
}

function seekSpeech(pct) {
  const newOffset = Math.floor((pct / 100) * totalChars);
  charOffset = newOffset;
  updateProgress();
  if (speaking) {
    startSpeech(charOffset);
  }
}

function updateRate() {
  if (speaking) {
    // Restart from current position with new rate
    startSpeech(charOffset);
  }
}

function updateProgress() {
  const pct = totalChars > 0 ? Math.round((charOffset / totalChars) * 100) : 0;
  elProgress.value    = pct;
  elTimeLabel.textContent = `${pct}% read`;
}

function resetProgress() {
  charOffset = 0;
  speaking = false;
  setPlayIcon(false);
  updateProgress();
}

function setPlayIcon(isPlaying) {
  elIconPlay.style.display  = isPlaying ? 'none' : '';
  elIconPause.style.display = isPlaying ? ''     : 'none';
  elPlayBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
}

/* ════════════════════════════════════════════════════════════════
   Reset back to landing
   ════════════════════════════════════════════════════════════════ */
function resetToLanding() {
  speechSynthesis.cancel();
  speaking    = false;
  charOffset  = 0;
  articleText = '';

  elBody.innerHTML      = '';
  elTitle.textContent   = '';
  elByline.textContent  = '';
  elUrlInput.value      = '';

  elReader.classList.remove('visible');
  elAudioBar.classList.remove('visible');
  elNewBtn.classList.remove('visible');
  elLanding.style.display = '';
  setPlayIcon(false);
  updateProgress();
  setStatus('');
}

/* ════════════════════════════════════════════════════════════════
   Utilities
   ════════════════════════════════════════════════════════════════ */
function setStatus(html, isError = false) {
  elStatus.innerHTML = html;
  elStatus.className = isError ? 'error' : '';
}

function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

// Allow pressing Enter in the URL input
elUrlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchArticle();
});
</script>

</body>
</html>
