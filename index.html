<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsWala</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f7;--bg3:#e8e8ed;
  --surface:#ffffff;--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
  --accent:#0071e3;--accent-soft:rgba(0,113,227,.09);
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.13);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --bar-bg:rgba(255,255,255,.88);--highlight:rgba(0,113,227,.06);
  --tr:.2s cubic-bezier(.4,0,.2,1)
}
[data-theme="dark"]{
  --bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;
  --surface:#1c1c1e;--text:#f5f5f7;--text2:#98989d;--text3:#48484a;
  --accent:#2997ff;--accent-soft:rgba(41,151,255,.12);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.13);
  --shadow-md:0 4px 16px rgba(0,0,0,.4);
  --bar-bg:rgba(28,28,30,.9);--highlight:rgba(41,151,255,.08)
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Geist',-apple-system,sans-serif;min-height:100vh;transition:background var(--tr),color var(--tr);overflow-x:hidden}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--bar-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{font-size:17px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
.nav-brand em{color:var(--accent);font-style:normal}
.theme-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all var(--tr)}
.theme-btn:hover{background:var(--bg3);color:var(--text)}
.theme-btn svg{width:15px;height:15px;fill:currentColor}
.i-moon{display:none}
[data-theme="dark"] .i-sun{display:none}
[data-theme="dark"] .i-moon{display:block}

/* SCREENS */
.screen{padding-top:52px;min-height:100vh}
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:0;min-height:100vh}
.landing-inner{width:100%;max-width:540px;padding:80px 24px 60px;display:flex;flex-direction:column;align-items:center;gap:32px}
.hero h1{font-size:clamp(30px,6vw,46px);font-weight:600;letter-spacing:-1.5px;line-height:1.1;text-align:center;margin-bottom:12px}
.hero p{font-size:16px;font-weight:300;color:var(--text2);text-align:center;line-height:1.5}
.input-box{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:5px 5px 5px 16px;display:flex;gap:8px;align-items:center;box-shadow:var(--shadow-md);transition:box-shadow var(--tr),border-color var(--tr)}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow-md)}
#url-in{flex:1;border:none;outline:none;background:transparent;font-family:'Geist',sans-serif;font-size:15px;color:var(--text);padding:10px 0;min-width:0}
#url-in::placeholder{color:var(--text3)}
#go-btn{background:var(--accent);border:none;border-radius:10px;padding:10px 18px;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;color:#fff;cursor:pointer;white-space:nowrap;transition:all var(--tr);flex-shrink:0}
#go-btn:hover{opacity:.86;transform:scale(.98)}
#go-btn:active{transform:scale(.95)}
.pills{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.pill{font-size:11px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 11px}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ring{width:34px;height:34px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.ring-label{font-size:14px;color:var(--text2);max-width:260px;text-align:center;line-height:1.5}

/* ERROR */
#error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px 24px}
.err-icon{font-size:36px;margin-bottom:4px}
.err-title{font-size:20px;font-weight:600;letter-spacing:-.4px}
.err-msg{font-size:14px;color:var(--text2);max-width:340px;line-height:1.6}
.err-back{margin-top:8px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-family:'Geist',sans-serif;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:all var(--tr)}
.err-back:hover{background:var(--bg3)}

/* READER */
#reader{display:none}

/* AUDIO BAR */
#audio-bar{position:fixed;top:52px;left:0;right:0;z-index:150;background:var(--bar-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;gap:13px;padding:0 18px;transform:translateY(-58px);transition:transform .35s cubic-bezier(.34,1.2,.64,1)}
#audio-bar.show{transform:translateY(0)}
#play-btn{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--tr);box-shadow:0 2px 8px rgba(0,113,227,.25)}
#play-btn:hover{opacity:.86;transform:scale(1.06)}
#play-btn svg{fill:#fff;width:13px;height:13px;flex-shrink:0}
#play-btn .i-pause{display:none}
#play-btn.on .i-play{display:none}
#play-btn.on .i-pause{display:block}
.prog-area{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
#prog-track{height:2px;background:var(--bg3);border-radius:1px;cursor:pointer}
#prog-fill{height:100%;background:var(--accent);border-radius:1px;width:0%;transition:width .4s linear}
.bar-meta{display:flex;justify-content:space-between;align-items:center;gap:8px}
#time-lbl{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;flex-shrink:0;white-space:nowrap}
#mini-ttl{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.bar-acts{display:flex;align-items:center;gap:6px;flex-shrink:0}
#spd-pill{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:500;font-family:'Geist',sans-serif;color:var(--text2);cursor:pointer;transition:all var(--tr)}
#spd-pill:hover{border-color:var(--accent);color:var(--accent)}
#cfg-btn{background:transparent;border:none;cursor:pointer;color:var(--text3);display:flex;padding:4px;border-radius:8px;transition:color var(--tr)}
#cfg-btn:hover{color:var(--accent)}
#cfg-btn svg{width:16px;height:16px;fill:currentColor}

/* SETTINGS */
#settings{position:fixed;top:110px;left:0;right:0;z-index:140;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:none;gap:12px;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.06)}
#settings.open{display:flex}
.srow{display:flex;align-items:center;gap:10px}
.slbl{font-size:12px;font-weight:500;color:var(--text2);width:42px;flex-shrink:0}
#voice-sel{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;font-family:'Geist',sans-serif;color:var(--text);outline:none;cursor:pointer}
.spds{display:flex;gap:5px;flex-wrap:wrap}
.spd{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;font-size:12px;font-family:'Geist',sans-serif;color:var(--text2);cursor:pointer;transition:all var(--tr)}
.spd.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:500}

/* ARTICLE */
#art-wrap{max-width:640px;margin:0 auto;padding:120px 24px 80px}
#art-back{background:none;border:none;font-family:'Geist',sans-serif;font-size:13px;color:var(--accent);cursor:pointer;padding:0;margin-bottom:28px;display:flex;align-items:center;gap:4px;transition:opacity var(--tr)}
#art-back:hover{opacity:.7}
#art-src{font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
#art-title{font-family:'Newsreader',Georgia,serif;font-size:clamp(22px,5vw,34px);font-weight:400;letter-spacing:-.3px;line-height:1.22;color:var(--text);margin-bottom:12px}
#art-meta{font-size:13px;color:var(--text3);margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid var(--border)}
#art-body{font-family:'Newsreader',Georgia,serif;font-size:clamp(16px,2.5vw,18px);line-height:1.85;color:var(--text)}
#art-body p{margin-bottom:1.5em;border-radius:5px;padding:3px 8px 3px 10px;border-left:2px solid transparent;transition:background .25s,border-color .25s;margin-left:-10px}
#art-body p.speaking{background:var(--highlight);border-left-color:var(--accent)}
#art-body h2{font-family:'Geist',sans-serif;font-size:18px;font-weight:600;margin:2em 0 .5em;letter-spacing:-.3px}
#art-body h3{font-family:'Geist',sans-serif;font-size:15px;font-weight:600;margin:1.5em 0 .4em}
#art-body blockquote{border-left:3px solid var(--accent);padding:2px 18px;margin:1.5em 0;font-style:italic;color:var(--text2)}
#art-body a{color:var(--accent);text-decoration:none}
#art-body ul,#art-body ol{padding-left:1.4em;margin-bottom:1.5em}
#art-body li{margin-bottom:.4em}

.hidden{display:none!important}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
</style>
</head>

<script>
// ── THEME ──
const html = document.documentElement;
const saved = localStorage.getItem('nw-theme');
if (saved) html.setAttribute('data-theme', saved);
document.getElementById('theme-btn').onclick = () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('nw-theme', next);
};

// ── STATE ──
let paras=[], cur=0, playing=false, rate=1;
let voices=[], voice=null;
let totalWords=0, totalSecs=0, elapsedSecs=0, ticker=null;

// ── SCREENS ──
function goLanding(){
  stopTTS();
  show('landing'); hide('loading'); hide('error-screen');
  document.getElementById('reader').style.display='none';
  document.getElementById('audio-bar').classList.remove('show');
  document.getElementById('settings').classList.remove('open');
}
function goLoading(msg){
  hide('landing'); show('loading'); hide('error-screen');
  document.getElementById('reader').style.display='none';
  document.getElementById('ring-lbl').textContent = msg || 'Fetching…';
}
function goError(msg){
  hide('loading'); show('error-screen');
  document.getElementById('err-msg').textContent = msg;
}
function goReader(){
  hide('loading');
  document.getElementById('reader').style.display = 'block';
  setTimeout(() => document.getElementById('audio-bar').classList.add('show'), 250);
}
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

// ── PARSE AI RESPONSE ──
// Robust: handles JSON, markdown-wrapped JSON, and plain text fallback
function parseAIResponse(rawText) {
  // Strip markdown code fences if present
  let text = rawText.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();

  // Attempt 1: find and parse a JSON object
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (jsonMatch) {
    try {
      const obj = JSON.parse(jsonMatch[0]);
      if (obj.content && obj.content.length > 100) return obj;
    } catch(e) {
      // JSON parse failed — manually extract fields
    }
    // Manual field extraction (handles unescaped content inside JSON)
    const titleM  = text.match(/"title"\s*:\s*"((?:[^"\\]|\\.)*)"/);
    const bylineM = text.match(/"byline"\s*:\s*"((?:[^"\\]|\\.)*)"/);
    const siteM   = text.match(/"site"\s*:\s*"((?:[^"\\]|\\.)*)"/);

    // For content: grab everything after "content": " to end of JSON block
    // Use a greedy approach — find the key and take rest up to last closing brace
    let content = '';
    const cIdx = text.indexOf('"content"');
    if (cIdx !== -1) {
      const afterKey = text.slice(cIdx + 9).replace(/^\s*:\s*"/, '');
      // Remove trailing JSON characters (last `"}` or `}`)
      content = afterKey
        .replace(/"\s*\}\s*$/, '')
        .replace(/\\n/g, '\n')
        .replace(/\\"/g, '"')
        .replace(/\\\\/g, '\\')
        .trim();
    }

    if (content.length > 100) {
      return {
        title:  titleM  ? titleM[1].replace(/\\"/g,'"')  : 'Article',
        byline: bylineM ? bylineM[1].replace(/\\"/g,'"') : '',
        site:   siteM   ? siteM[1].replace(/\\"/g,'"')   : '',
        content
      };
    }
  }

  // Attempt 2: structured plain-text delimiters (TITLE: / CONTENT: / END_CONTENT)
  const titleLine   = text.match(/^TITLE:\s*(.+)$/m);
  const bylineLine  = text.match(/^BYLINE:\s*(.+)$/m);
  const siteLine    = text.match(/^SITE:\s*(.+)$/m);
  const contentBlock = text.match(/CONTENT:\s*\n([\s\S]+?)(?:END_CONTENT|$)/i);
  if (titleLine && contentBlock && contentBlock[1].length > 100) {
    return {
      title:   titleLine[1].trim(),
      byline:  bylineLine ? bylineLine[1].trim() : '',
      site:    siteLine   ? siteLine[1].trim()   : '',
      content: contentBlock[1].trim()
    };
  }

  // Attempt 3: use raw text as content if it's long enough
  // (Claude just wrote the article as prose without any structure)
  const cleaned = text
    .replace(/^(here is|here's|below is|the full article)[^:\n]*[:：]?\s*/i, '')
    .trim();
  if (cleaned.length > 300) {
    return { title: 'Article', byline: '', site: '', content: cleaned };
  }

  return null;
}

// ── AI FETCH ──
async function fetchByAI(url) {
  goLoading('AI is reading the article…\n(this takes ~15 seconds)');

  // Use structured text delimiters to avoid JSON escaping issues
  const prompt =
`You are a web article extractor. Fetch the full text of this article: ${url}

Search the web for this URL. If it is behind a paywall, search for the article title and find a cached, archived, or alternative source with the full text.

Reply ONLY in this exact format — no other text before or after:

TITLE: [article title]
BYLINE: [author name and date, or leave blank]
SITE: [publication name]
CONTENT:
[paste the COMPLETE article body here, every paragraph, no summarizing]
END_CONTENT`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 8000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error('API error ' + res.status + (err.error?.message ? ': ' + err.error.message : ''));
  }

  const data = await res.json();

  // Collect all text blocks (ignore tool_use / tool_result blocks)
  const rawText = data.content
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('\n');

  if (!rawText || rawText.length < 50) {
    throw new Error('AI returned an empty response. The site may be fully blocked.');
  }

  const article = parseAIResponse(rawText);
  if (!article || !article.content || article.content.length < 100) {
    throw new Error('AI could not extract the article body. Try an archive.ph link of the article.');
  }

  return article;
}

// ── PROXY FETCH (fast, free — works for non-paywalled sites) ──
async function fetchByProxy(url) {
  goLoading('Connecting…');
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent('https://12ft.io/proxy?q=' + encodeURIComponent(url))}`,
  ];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(9000) });
      if (!res.ok) continue;
      let htmlText;
      if (proxy.includes('allorigins')) {
        const j = await res.json();
        htmlText = j.contents;
      } else {
        htmlText = await res.text();
      }
      if (!htmlText || htmlText.length < 500) continue;
      const doc = new DOMParser().parseFromString(htmlText, 'text/html');
      const reader = new Readability(doc, { charThreshold: 100 });
      const parsed = reader.parse();
      if (parsed && parsed.textContent && parsed.textContent.trim().length > 400) {
        return {
          title:   parsed.title  || '',
          byline:  parsed.byline || '',
          site:    new URL(url).hostname.replace('www.', ''),
          content: parsed.textContent.trim()
        };
      }
    } catch(e) { /* try next */ }
  }
  return null;
}

// ── MAIN PIPELINE ──
async function run() {
  const url = document.getElementById('url-in').value.trim();
  if (!url.startsWith('http')) {
    document.getElementById('url-in').focus();
    return;
  }
  stopTTS();

  try {
    // 1. Fast proxy attempt
    let art = null;
    try { art = await fetchByProxy(url); } catch(e) {}

    // 2. AI fallback (handles paywalls)
    if (!art || art.content.length < 300) {
      art = await fetchByAI(url);
    }

    render(art, url);
  } catch(err) {
    goError(err.message || 'Something went wrong. Please try another URL.');
  }
}

// ── RENDER ──
function render(art, url) {
  try {
    const dom = new URL(url).hostname.replace('www.', '');
    document.getElementById('art-src').textContent = (art.site || dom).toUpperCase();
  } catch(e) {}

  document.getElementById('art-title').textContent = art.title || 'Article';
  document.getElementById('mini-ttl').textContent  = art.title || '';
  document.getElementById('art-meta').textContent  = art.byline || '';

  const body = document.getElementById('art-body');
  const content = (art.content || '').trim();

  // If content has HTML tags, inject and clean; otherwise split plain text into paragraphs
  if (/<p[\s>]/i.test(content) || /<h[1-6][\s>]/i.test(content)) {
    body.innerHTML = content;
    body.querySelectorAll('script,style,iframe,nav,header,footer,aside,[class*="ad-"],[id*="ad-"]').forEach(e => e.remove());
  } else {
    body.innerHTML = '';
    content.split(/\n{2,}/).forEach(chunk => {
      const t = chunk.replace(/\n/g, ' ').trim();
      if (t.length > 10) {
        const p = document.createElement('p');
        p.textContent = t;
        body.appendChild(p);
      }
    });
  }

  buildTTS();
  goReader();
}

// ── TTS ──
function buildTTS() {
  paras = [];
  document.querySelectorAll('#art-body p,#art-body h2,#art-body h3,#art-body li,#art-body blockquote').forEach(n => {
    const t = n.textContent.trim();
    if (t.length > 10) { n.dataset.pi = paras.length; paras.push({ text: t, el: n }); }
  });
  totalWords = paras.reduce((a,p) => a + p.text.split(/\s+/).length, 0);
  totalSecs  = Math.round(totalWords / (150 * rate) * 60);
  cur = 0; elapsedSecs = 0;
  setTime(0, totalSecs); setProg(0);
}

function speakFrom(idx) {
  window.speechSynthesis.cancel(); clearInterval(ticker);
  playing = true; btnOn(true); cur = idx;
  elapsedSecs = paras.slice(0, idx).reduce((a,p) => a + Math.round(p.text.split(/\s+/).length / (150 * rate) * 60), 0);

  for (let i = idx; i < paras.length; i++) {
    const u = new SpeechSynthesisUtterance(paras[i].text);
    u.rate = rate; u.voice = voice;
    const pi = i;
    u.onstart = () => { cur = pi; hl(pi); tick(); };
    u.onend   = () => {
      elapsedSecs += Math.round(paras[pi].text.split(/\s+/).length / (150 * rate) * 60);
      clearInterval(ticker);
      if (pi === paras.length - 1) { playing = false; btnOn(false); setProg(1); setTime(totalSecs, totalSecs); clearHL(); }
    };
    u.onerror = () => {};
    window.speechSynthesis.speak(u);
  }
}

function tick() {
  clearInterval(ticker);
  const base = elapsedSecs, t0 = Date.now();
  ticker = setInterval(() => {
    const e = Math.min(base + (Date.now() - t0) / 1000, totalSecs);
    setTime(e, totalSecs); setProg(totalSecs > 0 ? e / totalSecs : 0);
  }, 500);
}

function togglePlay() {
  if (!paras.length) return;
  if (playing) {
    if (window.speechSynthesis.paused) { window.speechSynthesis.resume(); tick(); }
    else { window.speechSynthesis.pause(); clearInterval(ticker); }
  } else { speakFrom(cur); }
}

function stopTTS() {
  window.speechSynthesis.cancel(); clearInterval(ticker);
  playing = false; btnOn(false); clearHL();
}

function hl(i) {
  clearHL();
  const el = paras[i]?.el;
  if (el) { el.classList.add('speaking'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
}
function clearHL() { document.querySelectorAll('.speaking').forEach(e => e.classList.remove('speaking')); }
function btnOn(v)  { playing = v; document.getElementById('play-btn').classList.toggle('on', v); }
function setProg(f){ document.getElementById('prog-fill').style.width = (f * 100).toFixed(1) + '%'; }
function setTime(e,t){ document.getElementById('time-lbl').textContent = fmt(e) + ' / ' + fmt(t); }
function fmt(s)    { const n = Math.floor(s), m = Math.floor(n/60); return m + ':' + String(n%60).padStart(2,'0'); }

// ── VOICES ──
function loadVoices() {
  voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  const sel = document.getElementById('voice-sel');
  sel.innerHTML = '';
  const en  = voices.filter(v => v.lang.startsWith('en'));
  const inV = en.filter(v => v.lang.includes('IN'));
  const list = [...inV, ...en.filter(v => !v.lang.includes('IN'))];
  (list.length ? list : voices.slice(0,15)).forEach(v => {
    const o = document.createElement('option');
    o.value = v.name; o.textContent = `${v.name} (${v.lang})`; sel.appendChild(o);
  });
  const def = inV[0] || list[0];
  if (def) { voice = def; sel.value = def.name; }
}
window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices();
document.getElementById('voice-sel').addEventListener('change', function() {
  voice = voices.find(v => v.name === this.value) || null;
  if (playing) speakFrom(cur);
});

// ── SPEED ──
document.querySelectorAll('.spd').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.spd').forEach(b => b.classList.remove('on'));
    this.classList.add('on'); rate = parseFloat(this.dataset.v);
    document.getElementById('spd-pill').textContent = this.textContent;
    totalSecs = Math.round(totalWords / (150 * rate) * 60);
    setTime(elapsedSecs, totalSecs);
    if (playing) speakFrom(cur);
  });
});

// ── CONTROLS ──
document.getElementById('spd-pill').onclick = () => document.getElementById('settings').classList.toggle('open');
document.getElementById('cfg-btn').onclick  = () => document.getElementById('settings').classList.toggle('open');
document.getElementById('play-btn').onclick = togglePlay;
document.getElementById('prog-track').addEventListener('click', function(e) {
  if (!paras.length) return;
  const f = (e.clientX - this.getBoundingClientRect().left) / this.offsetWidth;
  speakFrom(Math.max(0, Math.min(Math.floor(f * paras.length), paras.length - 1)));
});
document.getElementById('go-btn').onclick = run;
document.getElementById('url-in').addEventListener('keydown', e => e.key === 'Enter' && run());
</script>
</body>
